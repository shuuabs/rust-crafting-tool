  <style>
    body { font-family: system-ui, sans-serif; background: #0f172a; color: #e2e8f0; }
    .item-card { background: #1e2937; border: 3px solid #334155; transition: all 0.3s; }
    .item-card:hover { border-color: #f97316; transform: translateY(-4px); box-shadow: 0 0 25px rgba(249, 115, 22, 0.4); }
    .item-img { width: 90px; height: 90px; object-fit: contain; image-rendering: crisp-edges; }
    .tab-active { background-color: #1e2937; border-bottom: 5px solid #f97316; font-weight: 700; }
    .player-tag { background: #10b981; padding: 2px 10px; border-radius: 9999px; font-size: 0.75rem; }

    .category-btn.active { background-color: #f97316; color: black; font-weight: 700; }

<body class="min-h-screen">
  <div class="max-w-7xl mx-auto p-6">
    <h1 class="text-4xl font-bold text-orange-500 mb-2">⚒️ Rust Tech Tree Tracker</h1>
    <p class="text-zinc-400 mb-8">全アイテム搭載・カテゴリ順ソート</p>

    <!-- 共有ボタン -->
    <div class="flex gap-3 mb-6 flex-wrap">
      <button onclick="exportData()" class="bg-emerald-600 hover:bg-emerald-500 px-6 py-2 rounded-xl">📤 エクスポート</button>
      <button onclick="importData()" class="bg-amber-600 hover:bg-amber-500 px-6 py-2 rounded-xl">📥 インポート</button>
      <button onclick="copyShareLink()" class="bg-blue-600 hover:bg-blue-500 px-6 py-2 rounded-xl">🔗 共有リンクコピー</button>
    </div>

    <!-- プレイヤー管理 -->
    <div class="bg-zinc-900 rounded-2xl p-6 mb-8 border border-zinc-700">
      <h2 class="text-xl font-semibold mb-4">👥 プレイヤーリスト</h2>
      <div class="flex gap-3 mb-4">
        <input id="newPlayer" class="flex-1 bg-zinc-800 border border-zinc-600 rounded-xl px-5 py-3 text-white" placeholder="名前を入力 (例: shuu)" type="text">
        <button onclick="addPlayer()" class="bg-orange-600 hover:bg-orange-500 px-8 py-3 rounded-xl">追加</button>
      </div>
      <div id="playersContainer" class="flex flex-wrap gap-3"></div>
    </div>

    <!-- タブ -->
    <div class="flex border-b border-zinc-700 mb-6 bg-zinc-900 rounded-t-3xl overflow-hidden">
      <button onclick="switchTab(1)" id="tab1" class="tab-active flex-1 py-5 text-xl">LEVEL 1</button>
      <button onclick="switchTab(2)" id="tab2" class="flex-1 py-5 text-xl">LEVEL 2</button>
      <button onclick="switchTab(3)" id="tab3" class="flex-1 py-5 text-xl">LEVEL 3</button>
    </div>

    <!-- カテゴリーフィルタ -->
    <div id="categoryFilter" class="flex flex-wrap gap-2 mb-8"></div>

    <div id="content" class="bg-zinc-900 border border-t-0 border-zinc-700 rounded-b-3xl p-8"></div>
  </div>
